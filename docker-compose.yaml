services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./Backend
    restart: unless-stopped
    # ports:
    #   - '8000:8000'
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - backend_storage:/var/www/storage/app
      - backend_cache:/var/www/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./Frontend
    restart: unless-stopped
    ports:
      - '8080:80'
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - backend

  bot:
    build: ./Bot
    restart: unless-stopped
    volumes:
      - bot_sessions:/app/PuskomSesi
    environment:
      API_URL: ${BOT_API_URL}
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  mysql_data:
  backend_storage:
  backend_cache:
  bot_sessions:
